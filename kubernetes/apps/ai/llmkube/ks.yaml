---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llmkube
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: llmkube
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: llmkube
      namespace: ai
  interval: 1h
  path: "./kubernetes/apps/ai/llmkube/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llmkube-models
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: llmkube-models
  # No GPU component for now (CPU-only). When you add an Nvidia GPU:
  #   components:
  #     - ../../components/gpu-nvidia   # new component, deviceClassName: gpu.nvidia.com
  dependsOn:
    - name: llmkube
      namespace: ai
    # Re-add once an Nvidia device-plugin Kustomization exists:
    # - name: nvidia-device-plugin
    #   namespace: kube-system
  interval: 1h
  path: "./kubernetes/apps/ai/llmkube/models"
  postBuild:
    substitute:
      APP: llmkube-models
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
