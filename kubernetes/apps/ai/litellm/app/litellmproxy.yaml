---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/litellm.home-operations.com/litellmproxy_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMProxy
metadata:
  name: litellm
spec:
  # renovate: datasource=docker depName=ghcr.io/berriai/litellm
  image: ghcr.io/berriai/litellm:v1.90.3
  replicas: 1
  generalSettings:
    health_check_endpoint: /v1/health
  routerSettings:
    routing_strategy: simple-shuffle
    redis_host: os.environ/REDIS_HOST
    redis_port: os.environ/REDIS_PORT
    num_retries: 3
    timeout: 600
  litellmSettings:
    cache: true
    cache_params:
      type: redis
      host: os.environ/REDIS_HOST
      port: os.environ/REDIS_PORT
    drop_params: true
  env:
    - name: LITELLM_LOG
      value: INFO
    - name: LITELLM_MODE
      value: PRODUCTION
    - name: REDIS_HOST
      value: dragonfly.database.svc.cluster.local
    - name: REDIS_PORT
      value: "6379"
    - name: LITELLM_MASTER_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-secret
          key: LITELLM_MASTER_KEY
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  service:
    type: ClusterIP
    port: 4000
  route:
    hostnames:
      - "litellm.${SECRET_DOMAIN}"
    parentRefs:
      - name: envoy-internal
        namespace: network
